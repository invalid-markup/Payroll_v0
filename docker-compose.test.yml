version: '3.8'
services:
  postgres_test:
    image: postgres:15
    environment:
      POSTGRES_DB: payroll_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgtestdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payroll_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgtestdata:
*** End Patch